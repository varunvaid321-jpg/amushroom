<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>aMushroom Account</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/styles/tokens.css?v=20260225c" />
  <link rel="stylesheet" href="/styles/auth.css?v=20260225c" />
</head>
<body>
  <main class="auth-page">
    <header class="auth-header">
      <div>
        <h1 class="auth-title">aMushroom Account</h1>
        <p class="auth-subtitle">Create an account, sign in, and manage your upload history.</p>
      </div>
      <a class="auth-link" href="/">Back to Identifier</a>
    </header>

    <p id="authStatus" class="auth-status" aria-live="polite"></p>

    <section id="signedOut" class="auth-grid">
      <article class="card">
        <h2 class="card-title">Sign in</h2>
        <form id="loginForm" class="form">
          <label class="field">
            <span>Email</span>
            <input type="email" name="email" autocomplete="email" required />
          </label>
          <label class="field">
            <span>Password</span>
            <input type="password" name="password" autocomplete="current-password" required />
          </label>
          <button class="btn btn-primary" type="submit">Sign in</button>
        </form>

        <div class="divider">or</div>
        <button id="googleButton" class="btn btn-google" type="button">
          <svg class="btn-google__icon" viewBox="0 0 18 18" aria-hidden="true" focusable="false">
            <path fill="#4285F4" d="M17.64 9.205c0-.639-.057-1.252-.164-1.841H9v3.481h4.844a4.14 4.14 0 0 1-1.797 2.716v2.258h2.908c1.702-1.567 2.685-3.875 2.685-6.614z"/>
            <path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.181l-2.908-2.258c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.583-5.036-3.71H.957v2.332A9 9 0 0 0 9 18z"/>
            <path fill="#FBBC05" d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A9 9 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z"/>
            <path fill="#EA4335" d="M9 3.58c1.322 0 2.508.455 3.44 1.348l2.58-2.58C13.463.891 11.426 0 9 0A9 9 0 0 0 .957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z"/>
          </svg>
          <span>Continue with Google</span>
        </button>
      </article>

      <article class="card">
        <h2 class="card-title">Create account</h2>
        <form id="registerForm" class="form">
          <label class="field">
            <span>Name</span>
            <input type="text" name="name" autocomplete="name" />
          </label>
          <label class="field">
            <span>Email</span>
            <input type="email" name="email" autocomplete="email" required />
          </label>
          <label class="field">
            <span>Password</span>
            <input type="password" name="password" autocomplete="new-password" required />
          </label>
          <button class="btn btn-primary" type="submit">Create account</button>
        </form>
      </article>
    </section>

    <section id="signedIn" class="card" hidden>
      <div class="signed-in-head">
        <div>
          <h2 class="card-title">Account</h2>
          <p id="userLine" class="meta"></p>
        </div>
        <button id="logoutButton" class="btn btn-secondary" type="button">Log out</button>
      </div>

      <h3 class="subheading">Recent uploads</h3>
      <div id="uploadsList" class="uploads"></div>
    </section>
  </main>

  <script src="/scripts/auth.js?v=20260225c" defer></script>
</body>
</html>
