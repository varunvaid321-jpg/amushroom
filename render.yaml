services:
  - type: web
    name: amushroom
    env: node
    plan: starter
    rootDir: .
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /healthz
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: HOST
        value: 0.0.0.0
      - key: PORT
        value: 10000
      - key: MUSHROOM_API_KEY
        sync: false
      - key: MUSHROOM_API_URL
        value: https://mushroom.kindwise.com/api/v1/identification
      - key: MUSHROOM_API_LANGUAGE
        value: en
      - key: ENABLE_MIX_CHECK
        value: true
      - key: MIX_CONFIDENCE_THRESHOLD
        value: 75
      - key: IDENTIFY_RATE_LIMIT_ENABLED
        value: true
      - key: RATE_LIMIT_WINDOW_MS
        value: 60000
      - key: RATE_LIMIT_MAX
        value: 20
      - key: APP_BASE_URL
        value: https://amushroom.com
