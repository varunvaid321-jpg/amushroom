services:
  - type: web
    name: orangutany
    env: node
    plan: free
    rootDir: .
    buildCommand: npm ci && cd frontend && npm ci --include=dev && npm run build
    startCommand: PORT=3001 node server.js & cd frontend && API_URL=http://localhost:3001 PORT=10000 HOST=0.0.0.0 npm start
    healthCheckPath: /
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: NODE_ENV
        value: production
      - key: MUSHROOM_API_KEY
        sync: false
      - key: ADMIN_EMAILS
        sync: false
      - key: APP_BASE_URL
        value: https://orangutany.com
      - key: TRUST_PROXY
        value: true
      - key: HOST
        value: 127.0.0.1
